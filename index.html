<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>재무관리 · 베이비빌리</title>
<link rel="icon" type="image/png" href="https://villagebaby.kr/assets/img/billy-author-256.png">
<link rel="apple-touch-icon" href="https://villagebaby.kr/assets/img/billy-author-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --billy-blue:#3373BA;--billy-blue-700:#2a5f9b;--billy-blue-600:#2f69a8;--billy-blue-50:#eaf1f9;--billy-blue-100:#dbe8f5;
  --billy-pink:#f6d5c3;--billy-pink-soft:#fdeee6;--billy-pink-deep:#e7a988;
  --gray:#898989;--gray-900:#1f2329;--gray-800:#3a3f47;--gray-700:#5b6068;--gray-600:#777c84;--gray-400:#aeb2b8;--gray-300:#d6d9dd;--gray-200:#e8eaed;--gray-100:#f1f3f5;--gray-50:#f8f9fa;--white:#fff;
  --sys-red:#F2545B;--sys-orange:#FF9F2D;--sys-green:#33B97D;
  --r-card:16px;--r-md:8px;--r-sm:4px;
  --sh-s:0 1px 6px rgba(0,0,0,.12);--sh-l:0 3px 17px 2px rgba(0,0,0,.13);--sh-xl:0 3px 27px 6px rgba(0,0,0,.15);--sh-blue:0 3px 14px 1px rgba(51,115,186,.32);
  --font:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);color:var(--gray-900);background:var(--gray-50);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:236px;background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;padding:22px 20px 18px}
.brand .logo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-blue);flex-shrink:0;background:var(--billy-blue);color:#fff;font-weight:700;font-size:15px}
.brand .tit{font-weight:700;font-size:16px;letter-spacing:-.3px}
.brand .tit small{display:block;font-weight:400;font-size:11px;color:var(--gray)}
.nav{padding:6px 12px;display:flex;flex-direction:column;gap:2px;flex:1;min-height:0;overflow-y:auto}
.nav-label{font-size:11px;color:var(--gray-400);font-weight:500;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--r-md);color:var(--gray-700);font-weight:500;transition:.12s}
.nav-item svg{width:19px;height:19px;flex-shrink:0;stroke:var(--gray-600);stroke-width:1.7;fill:none}
.nav-item:hover{background:var(--gray-50)}
.nav-item.active{background:var(--billy-blue-50);color:var(--billy-blue);font-weight:700}
.nav-item.active svg{stroke:var(--billy-blue)}
.nav-item .dot{margin-left:auto;background:var(--sys-red);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.side-foot{margin-top:auto;padding:14px;border-top:1px solid var(--gray-100)}
.userchip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-md)}
.userchip .av{width:34px;height:34px;border-radius:50%;background:var(--billy-pink);color:var(--billy-pink-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.userchip .nm{font-weight:700;font-size:13px}
.userchip .rl{font-size:11px;color:var(--gray)}
.rolesel{margin-top:9px}
.rolesel select{width:100%;height:36px;border:1.4px solid var(--gray-300);border-radius:var(--r-md);padding:0 10px;font-weight:600;font-size:12.5px;color:var(--gray-700);background:#fff;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23898989' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 8px center;padding-right:28px}
.demo-note{font-size:11px;color:var(--gray-400);margin-top:8px;text-align:center;line-height:1.4}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;padding:30px 34px 16px;gap:20px}
.page-h h1{font-size:25px;font-weight:700;letter-spacing:-.6px}
.page-h p{color:var(--gray);margin-top:5px;font-size:13px}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.content{padding:8px 34px 48px;flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:40px;padding:0 18px;border-radius:var(--r-md);font-weight:700;font-size:14px;transition:.12s;white-space:nowrap}
.btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}
.btn-sm{height:32px;padding:0 13px;font-size:13px}.btn-sm svg{width:14px;height:14px}
.btn-primary{background:var(--billy-blue);color:#fff;box-shadow:var(--sh-blue)}
.btn-primary:hover{background:var(--billy-blue-600)}
.btn-line{background:#fff;color:var(--billy-blue);border:1.4px solid var(--billy-blue)}
.btn-line:hover{background:var(--billy-blue-50)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-danger{background:#fff;color:var(--sys-red);border:1.4px solid var(--sys-red)}
.btn-danger:hover{background:#fdecec}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-card);box-shadow:var(--sh-s)}
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.search{position:relative;margin-left:auto}
.search input{height:40px;border:1.4px solid var(--gray-300);border-radius:999px;padding:0 16px 0 38px;width:230px;background:#fff}
.search input:focus{outline:none;border-color:var(--billy-blue);box-shadow:0 0 0 3px var(--billy-blue-50)}
.search svg{position:absolute;left:13px;top:11px;width:18px;height:18px;stroke:var(--gray-400);stroke-width:2;fill:none}
.seg{display:inline-flex;border:1.4px solid var(--gray-300);border-radius:var(--r-md);overflow:hidden}
.seg button{height:34px;padding:0 14px;font-size:12.5px;font-weight:600;color:var(--gray-600);background:#fff}
.seg button.on{background:var(--billy-blue);color:#fff}
.chip{display:inline-flex;align-items:center;height:28px;padding:0 11px;border-radius:999px;border:1.4px solid var(--gray-300);background:#fff;font-size:12px;font-weight:600;color:var(--gray-600);margin:3px 4px 3px 0}
.chip.on{background:var(--billy-blue);color:#fff;border-color:var(--billy-blue)}
.chip:hover{border-color:var(--billy-blue)}
.fgroup{margin-bottom:9px}
.fgroup .fl{font-size:11.5px;color:var(--gray);font-weight:600;margin-bottom:3px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
thead th{text-align:left;color:var(--gray-600);font-weight:700;font-size:12.5px;padding:13px 14px;border-bottom:1.5px solid var(--gray-200);white-space:nowrap;background:var(--gray-50)}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--billy-blue)}
th .ar{font-size:9px;margin-left:3px;color:var(--billy-blue)}
tbody td{padding:13px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tbody tr:hover{background:var(--billy-blue-50)}
tbody tr:last-child td{border-bottom:none}
.t-name{font-weight:700;white-space:nowrap}
.t-sub{color:var(--gray);font-size:12px}
.nmcell{word-break:keep-all}
th.rz{position:relative;width:var(--cw,300px);min-width:120px}.rzh{position:absolute;top:16%;right:-3px;width:8px;height:68%;cursor:col-resize;z-index:3;border-right:2px solid var(--gray-200)}.rzh:hover,.rzh.drag{border-right-color:var(--billy-blue)}td.rzc>div{max-width:var(--cw,300px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}td.rzc>.t-name{white-space:normal;text-overflow:clip;line-height:1.35}
.period-bar{margin-bottom:12px}.sortctl{display:inline-flex;align-items:center;gap:6px}.sortctl .sl{font-size:12px;color:var(--gray);font-weight:600}.filters select{height:34px;border:1px solid var(--gray-200);border-radius:9px;padding:0 8px;font-size:12.5px;background:#fff;color:var(--gray-800);cursor:pointer}.seg-range{display:flex;align-items:center;gap:8px;margin:9px 0 2px;font-size:13px;color:var(--gray-700)}.seg-range input{height:34px;padding:0 10px;border:1px solid var(--gray-200);border-radius:9px;font-size:13px}
.sumbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:var(--billy-blue-50);border:1px solid var(--billy-blue-100);border-radius:12px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:var(--gray-800)}.sumbar .sb-seg span{color:var(--gray)}.sumbar b{font-weight:800}.sumbar .sb-x{margin-left:auto}
.todo{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fff7ed;border:1px solid #ffe2bb;border-radius:12px;padding:10px 15px;margin-bottom:14px;font-size:13px}.todo.ok{background:#e8f6ee;border-color:#bce6cf;color:#1f7a45}.todo-h{font-weight:800;color:var(--billy-blue)}.todo-item{background:#fff;border:1px solid var(--gray-200);border-radius:999px;padding:6px 13px;cursor:pointer;font-size:12.5px;color:var(--gray-800)}.todo-item b{color:var(--sys-orange)}.todo-item.warn b{color:var(--sys-red)}.todo-item:hover{box-shadow:0 0 0 2px var(--billy-blue-50)}
.flagwrap{cursor:pointer}.anom-card{border:1px solid var(--gray-200);border-radius:10px;padding:11px 13px;margin-bottom:10px}.anom-card.warn{background:#fdecec;border-color:#f7c9c9}.anom-card.caution{background:#fff7ed;border-color:#ffe2bb}.anom-t{font-weight:800;font-size:13px;margin-bottom:3px}.anom-d{font-size:12.5px;color:var(--gray-700);margin-bottom:8px;line-height:1.5}.anom-list{display:flex;flex-direction:column;gap:5px}.anom-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12.5px;background:#fff;border:1px solid var(--gray-100);border-radius:8px;padding:6px 10px}.anom-row span{color:var(--gray)}.anom-row b{font-weight:700;color:var(--gray-800)}.anom-row.warn{border-color:#f7c9c9;background:#fff6f6}
.rowclk{cursor:pointer}tbody tr.rowclk:hover{background:var(--billy-blue-50)}
.filtwrap{position:relative;z-index:60}.filterpop{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--gray-200);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.14);padding:14px 16px;min-width:300px;max-width:min(92vw,420px)}.filtpop-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--gray-100)}.filt-backdrop{position:fixed;inset:0;z-index:55;background:transparent}
.mnav{display:none}.mnav-item{display:inline-flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;border:none;background:transparent;color:var(--gray-600);font-size:11px;font-weight:600;padding:5px 13px;border-radius:10px;cursor:pointer;position:relative}.mnav-item svg{width:20px;height:20px;stroke:var(--gray-600);stroke-width:1.7;fill:none}.mnav-item.active{color:var(--billy-blue);background:var(--billy-blue-50)}.mnav-item.active svg{stroke:var(--billy-blue)}.mnav-item .dot{position:absolute;top:1px;right:8px;margin:0}
.num{font-variant-numeric:tabular-nums;white-space:nowrap}
.amt{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.ellip{max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 10px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-pending{background:#fff5e9;color:var(--sys-orange)}
.badge-paid{background:#e8f6ee;color:#1f9d57}
.badge-rejected{background:#fdecec;color:var(--sys-red)}
.badge-canceled{background:var(--gray-100);color:var(--gray)}
button.badge{border:none;cursor:pointer;font-family:inherit}
button.badge:hover{filter:brightness(.96)}
.badge .caret{font-size:9px;opacity:.6;margin-left:1px}
.statusmenu{position:fixed;z-index:120;background:#fff;border:1px solid var(--gray-200);border-radius:12px;box-shadow:var(--sh-l);padding:6px;display:flex;flex-direction:column;gap:2px;min-width:158px}
.statusopt{display:flex;align-items:center;gap:8px;padding:7px 9px;border:none;background:none;cursor:pointer;border-radius:8px;text-align:left;font-size:13px;width:100%}
.statusopt:hover{background:var(--gray-100)}
.statusopt.cur{background:var(--billy-blue-50)}
.statusbackdrop{position:fixed;inset:0;z-index:115;background:transparent}
.tag{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:6px;font-size:11.5px;font-weight:700;white-space:nowrap}
.tag-gray{background:var(--gray-100);color:var(--gray-600)}
.tag-blue{background:var(--billy-blue-50);color:var(--billy-blue)}
.tag-fuel{background:#eef7ed;color:#3a9d5d}
.flag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:5px;margin:1px 2px 1px 0;white-space:nowrap}
.flag.warn{background:#fdecec;color:#d64545}
.flag.caution{background:#fff1e2;color:#d9821f}
.flag.info{background:var(--billy-blue-50);color:var(--billy-blue)}
.overlay{position:fixed;inset:0;background:rgba(31,35,41,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;animation:fade .15s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--r-card);box-shadow:var(--sh-xl);width:520px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;animation:pop .18s}
.modal.wide{width:700px}
@keyframes pop{from{transform:translateY(12px) scale(.98);opacity:.6}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 6px}
.modal-head h3{font-size:18px;font-weight:700}
.modal-head .x{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gray)}
.modal-head .x:hover{background:var(--gray-100)}
.modal-body{padding:14px 24px;overflow-y:auto}
.modal-foot{padding:16px 24px 22px;display:flex;gap:10px}
.modal-foot .btn{flex:1}
.form-row{margin-bottom:15px}
.form-row>label{display:block;font-weight:700;font-size:13px;margin-bottom:7px}
.form-row .req{color:var(--billy-blue)}
.form-row .hint{color:var(--gray);font-weight:400;font-size:12px;margin-left:4px}
.input,textarea.input{width:100%;height:42px;border:1.4px solid var(--gray-300);border-radius:var(--r-md);padding:0 13px;background:#fff}
textarea.input{height:auto;padding:11px 13px;resize:vertical;min-height:60px}
.input:focus,textarea.input:focus{outline:none;border-color:var(--billy-blue);box-shadow:0 0 0 3px var(--billy-blue-50)}
select.input{appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23898989' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.preview-box{background:var(--billy-blue-50);border-radius:var(--r-md);padding:12px 15px;display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:10px;flex-wrap:wrap}
.preview-box b{font-size:16px;color:var(--billy-blue)}
.dl{display:grid;grid-template-columns:120px 1fr;gap:9px 14px;font-size:13.5px}
.dl dt{color:var(--gray);font-weight:500}
.dl dd{font-weight:500;word-break:break-all}
.hr{height:1px;background:var(--gray-100);margin:13px 0}
.empty{text-align:center;padding:54px 20px;color:var(--gray)}
.empty svg{width:44px;height:44px;stroke:var(--gray-300);stroke-width:1.5;margin-bottom:12px;fill:none}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--gray-900);color:#fff;padding:13px 22px;border-radius:999px;font-weight:500;font-size:13.5px;box-shadow:var(--sh-l);z-index:200;display:flex;align-items:center;gap:9px;animation:up .2s}
.toast.ok{background:#1f7a52}.toast.err{background:#c23b42}
@keyframes up{from{transform:translate(-50%,14px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.toast svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none}
.cbx{width:17px;height:17px;cursor:pointer;accent-color:var(--billy-blue);vertical-align:middle}
.batchbar{display:flex;align-items:center;gap:10px;background:var(--billy-blue-50);border:1px solid var(--billy-blue-100);border-radius:var(--r-md);padding:10px 14px;margin-bottom:14px;flex-wrap:wrap}
.batchbar .sel{font-weight:700;color:var(--billy-blue)}
.rowact{display:flex;gap:6px;justify-content:flex-end}
.iconbtn{width:30px;height:30px;border-radius:7px;border:1.4px solid var(--gray-200);background:#fff;color:var(--gray-600);display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{border-color:var(--billy-blue);color:var(--billy-blue);background:var(--billy-blue-50)}
.iconbtn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.9;fill:none}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}.kpis.dash{grid-template-columns:repeat(3,minmax(0,1fr))}.kpis.dash .val{font-size:18px}.kpis.dash .lbl{font-size:12px}
.kpi{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-card);padding:15px 18px;box-shadow:var(--sh-s)}
.kpi.click{cursor:pointer;transition:.12s}
.kpi.click:hover{box-shadow:0 0 0 3px var(--billy-blue-50);border-color:var(--billy-blue)}
.kpi .lbl{color:var(--gray);font-size:12.5px;font-weight:500}
.kpi .val{font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-.5px}
.kpi.blue{background:var(--billy-blue-50);border-color:var(--billy-blue-100)}.kpi.blue .val{color:var(--billy-blue)}
.kpi.green{background:#e8f6ee;border-color:#bce6cf}.kpi.green .val{color:#1f9d57}
.kpi.orange{background:#fff5e9;border-color:#ffe2bb}.kpi.orange .val{color:#d9821f}
.kpi.red{background:#fdecec;border-color:#f7c9c9}.kpi.red .val{color:var(--sys-red)}
.dash2{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:980px){.dash2{grid-template-columns:1fr}}
.panel{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-card);box-shadow:var(--sh-s);padding:18px 20px}
.panel h3{font-size:15px;font-weight:700;margin-bottom:14px}
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:12.5px}
.barrow.clk{cursor:pointer}.barrow.clk:hover .bl{color:var(--billy-blue)}
.barrow .bl{width:74px;font-weight:600;color:var(--gray-700);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barrow .bt{flex:1;height:18px;background:var(--gray-100);border-radius:5px;overflow:hidden}
.barrow .bt>i{display:block;height:100%;background:var(--billy-blue);border-radius:5px}
.barrow .bv{width:128px;text-align:right;font-variant-numeric:tabular-nums;color:var(--gray-700);flex-shrink:0}
.policy{background:var(--billy-pink-soft);border:1px solid #f4dccf;border-radius:var(--r-md);padding:13px 15px;margin-bottom:16px;font-size:12.5px;line-height:1.7;color:var(--gray-800)}
.policy b{color:var(--billy-pink-deep)}
.policy ol{margin:6px 0 0 18px}
.acct-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.4px solid var(--gray-200);border-radius:var(--r-md);margin-bottom:8px}
.acct-row.primary{border-color:var(--billy-blue);background:var(--billy-blue-50)}

function scanPayout(r,excludeId){
  const flags=[];const v=findVendor(r.payee);
  if(r.category!=='유류비'){
    if(!v){flags.push({s:'caution',t:'🆕 첫 거래',d:'과거 이력에 없는 거래처예요. 통장사본·사업자등록증(또는 신분증) 확인 후 등록하세요.'});}
    else{
      const known=v.accounts.map(a=>digits(a.account));
      if(r.account&&!known.includes(digits(r.account))){const pa=v.accounts.find(a=>a.primary)||v.accounts[0];flags.push({s:'warn',t:'🔁 계좌 변경',d:'기존 계좌와 달라요 (대표계좌 '+(pa?pa.bank+' '+pa.account:'-')+'). 변경 확인 필요.'});}

    }
  }
  const dup=DB.payout.find(x=>x.id!==excludeId&&x.id!==r.id&&x.status!=='canceled'&&x.status!=='rejected'&&payDup(x)===payDup(r)&&Math.abs(daysBetween(r.applied||today(),x.applied))<=14);
  if(dup)flags.push({s:'warn',t:'♊ 중복 의심',d:'동일 거래처·계좌·금액이 14일 내 또 있어요.'});

  return flags;
}

function submitPayout(){
  const pt=val('f_prooftype'),adeq=PROOF_ADEQ.has(pt);
  const r={id:uid('p'),requester:ME().name,team:ME().team,payee:val('f_payee'),bank:val('f_bank'),account:val('f_account'),amount:numVal('f_amount'),unit:val('f_unit')||'원',category:val('f_cat'),purpose:val('f_purpose'),evidence:val('f_evidence'),proofType:pt,proofDate:adeq?val('f_proofdate'):'',proofStatus:adeq?(val('f_proofstatus')||'받을예정'):'',proofReason:pt==='none'?val('f_proofreason'):'',proofReceivedAt:(adeq&&val('f_proofstatus')==='수취완료')?today():'',hasTax:pt==='세금계산서',status:'requested',applied:today(),paidAt:''};
  if(!r.payee||!r.account||!r.amount){toast('거래처·계좌·금액은 필수예요.','err');return;}
  if(!pt){toast('증빙 유형을 선택해 주세요. (미수취 시 가산세 대상이에요)','err');return;}
  if(adeq&&!r.proofDate){toast('증빙 작성일자를 입력해 주세요.','err');return;}
  if(pt==='명세서'&&!r.evidence){toast('거래명세서·영수증은 증빙 링크(Dropbox)가 필요해요.','err');return;}
  if(pt==='none'&&!r.proofReason){toast('증빙 없음 사유를 적어주세요.','err');return;}
  if(isLockedMonth(today())){toast(today().slice(0,7)+'은 마감되어 신청할 수 없어요.','err');return;}
  r.approver=approverFor(r.requester,r.amount);
  const recur=document.getElementById('f_recur').checked,total=Math.max(1,numVal('f_recurN')||1);
  const warns=scanPayout(r).filter(f=>f.s==='warn');
  const go=()=>{
    sv('fin_submit_payout',{p:payoutPayload(r,recur?total:0)},()=>{
      DB.payout.unshift(r);
      if(recur&&total>1)DB.templates.push({id:uid('t'),requester:r.requester,team:r.team,payee:r.payee,bank:r.bank,account:r.account,amount:r.amount,category:r.category,purpose:r.purpose,hasTax:r.hasTax,total,done:1,nextDate:addMonth(today(),1)});
    }).then(()=>{closeModal();render();toast(recur&&total>1?'이체 요청 + 정기('+total+'회) 등록했어요.':'이체 요청을 등록했어요.','ok');});
  };
  if(warns.length){closeModal();confirmModal('⚠️ 이상 신호 확인',warns.map(f=>'<b>'+f.t+'</b> — '+escH(f.d)).join('<br>')+'<br><br>그래도 등록할까요?',go);return;}
  go();
}

function proofDetailHtml(r){

    const ov=proofOverdue(r);
    const stxt=r.proofStatus==='수취완료'?`<span class="badge badge-paid">수취완료${r.proofReceivedAt?' · '+escH(r.proofReceivedAt):''}</span>`:`<span class="badge ${ov?'badge-rejected':'badge-pending'}">받을 예정${ov?' · ⛔ 발행기한 경과':''}</span>`;
    const dl=proofDeadline(r.proofDate);const dls=dl?dl.getFullYear()+'-'+String(dl.getMonth()+1).padStart(2,'0')+'-'+String(dl.getDate()).padStart(2,'0'):'-';

    if(canApprove())body+=`<div style="margin-top:9px">${r.proofStatus==='수취완료'?`<button class="btn btn-sm btn-line" onclick="markProof('${r.id}',false)">받을예정으로 되돌리기</button>`:`<button class="btn btn-sm btn-primary" onclick="markProof('${r.id}',true)">${I.check}<span>증빙 수취완료</span></button>`}</div>`;
  }else if(r.proofType==='none'){
    body=`<div class="dl"><dt>증빙 유형</dt><dd>증빙 없음</dd><dt>사유</dt><dd>${escH(r.proofReason||'-')}</dd></div>`;
  }else{
    body=`<div class="dl"><dt>증빙 유형</dt><dd>${escH(PROOF_LABEL[r.proofType]||r.proofType)}</dd>${url?`<dt>증빙 링크</dt><dd>${url}</dd>`:'<dt>증빙 링크</dt><dd class="t-sub">없음</dd>'}</div>`;
  }
  return `<div class="hr"></div><div style="font-weight:700;font-size:13px;margin-bottom:8px">🧾 증빙</div>${body}`;
}

function parseBulk(){const out=[];val('bulk_data').split(/\r?\n/).forEach(line=>{if(!line.trim())return;const c=line.split(/\t|,/).map(s=>s.trim());if(c.length<3)return;out.push({payee:c[0],bank:c[1]||'',account:(c[2]||'').replace(/[^0-9-]/g,''),amount:Number((c[3]||'').replace(/[^0-9]/g,''))||0,purpose:c[4]||''});});return out;}

function submitBulk(){
  const rows=parseBulk().filter(r=>r.payee&&r.account&&r.amount);
  if(!rows.length){toast('붙여넣은 데이터를 확인해 주세요 (예금주·계좌·금액 필요).','err');return;}
  if(isLockedMonth(today())){toast(today().slice(0,7)+'은 마감되어 신청할 수 없어요.','err');return;}
  const mk=r=>({id:uid('p'),requester:ME().name,team:ME().team,payee:r.payee,bank:r.bank,account:r.account,amount:r.amount,unit:'원',category:'기타',purpose:r.purpose,evidence:'',proofType:'세금계산서',proofDate:today(),proofStatus:'받을예정',hasTax:false,status:'requested',applied:today(),paidAt:''});
  if(IS_SUPA){Promise.all(rows.map(r=>sb.rpc('fin_submit_payout',{p:payoutPayload(mk(r),0)}))).then(()=>loadData()).then(()=>{closeModal();render();toast(rows.length+'건 일괄 등록했어요.','ok');}).catch(()=>toast('일부 등록 실패','err'));}
  else{rows.forEach(r=>DB.payout.unshift(mk(r)));closeModal();render();toast(rows.length+'건 일괄 등록했어요.','ok');}
}

function recurOnce(tid){const t=DB.templates.find(x=>x.id===tid);if(!t||t.done>=t.total)return;sv('fin_recur_once',{p_id:tid},()=>{const r={id:uid('p'),requester:t.requester,team:t.team,payee:t.payee,bank:t.bank,account:t.account,amount:t.amount,unit:'원',category:t.category,purpose:t.purpose+' (정기 '+(t.done+1)+'/'+t.total+')',hasTax:t.hasTax,status:'requested',applied:t.nextDate,paidAt:''};DB.payout.unshift(r);t.done++;t.nextDate=addMonth(t.nextDate,1);}).then(()=>{closeModal();render();toast('정기 이체 회차를 생성했어요.','ok');});}

function invoiceDeadline(w){if(!w)return null;const d=new Date(w);return new Date(d.getFullYear(),d.getMonth()+1,10);}
function deadlineBadge(w){const dl=invoiceDeadline(w);if(!dl)return '';const left=Math.round((dl-new Date(today()))/86400000);if(left<0)return `<span class="flag warn" title="익월 10일 초과 — 가산세">⛔ 발행기한 초과</span>`;if(left<=3)return `<span class="flag caution" title="익월 10일까지">⏰ 발행기한 D-${left}</span>`;return '';}

/* 신규 거래처 승인 대기 = 이체엔 썼지만 아직 거래처 마스터에 없는 입금처 */
function pendingNewVendors(){
  const seen={};
  DB.payout.forEach(r=>{
    if(r.status==='canceled'||r.status==='rejected')return;
    if(r.category==='유류비'||r.category==='인건비(3.3%)')return;       // 본인 정산·인건비 제외
    if(r.payee&&r.payee===r.requester)return;                          // 본인 송금 제외
    if(!r.payee||findVendor(r.payee))return;                           // 이미 마스터에 있음
    if(/^(주식회사\s*|국세[_\s]*)?빌리지베이비/.test(r.payee))return;   // 내부이체 제외
    let s=seen[r.payee];if(!s){s=seen[r.payee]={payee:r.payee,cnt:0,sum:0,bank:'',account:'',unit:'원',evidence:'',last:''};}
    s.cnt++;if(r.unit==='원')s.sum+=r.amount;
    if(!s.last||String(r.applied)>=s.last){s.last=r.applied;s.bank=r.bank;s.account=r.account;s.unit=r.unit||'원';if(r.evidence)s.evidence=r.evidence;}
  });
  return Object.keys(seen).map(k=>seen[k]).sort((a,b)=>String(b.last).localeCompare(String(a.last)));
}

function submitCoupon(){

  if(IS_SUPA){sb.rpc('fin_coupon_request',{p:payload}).then(({data,error})=>{if(error){toast(error.message||'발급 중 오류','err');return;}loadData().then(()=>{closeModal();render();couponResult(data);});});}

function mockCouponRequest(p){
  const norm=normPhone(p.phone);
  if(!p.override&&DB.coupons.some(r=>r.phoneNorm===norm&&r.status==='issued'))return {error:'이미 쿠폰이 발급된 번호입니다 (휴대폰 기준 1인 1회).'};
  const monthCnt=DB.coupons.filter(r=>r.requester===ME().name&&(r.status==='issued'||r.status==='pending')&&String(r.createdAt||'').slice(0,7)===today().slice(0,7)).length;
  let status='issued',hold='',code='';
  if(!p.override&&monthCnt>=2){status='pending';hold='월 3회 초과 — 관리자 승인 필요';}
  else{const av=DB.couponCodes.find(x=>x.status==='available');if(!av){status='pending';hold='코드 재고 없음 — 관리자 추가 후 발급';}else{av.status='issued';code=av.code;}}
  const rec={id:uid('c'),requester:ME().name,requesterEmail:(ME().email||''),team:ME().team,name:p.name,phone:p.phone,phoneNorm:norm,amount:30000,code:code,status:status,hold:hold,isOverride:!!p.override,memo:p.memo||'',createdAt:today()};
  DB.coupons.unshift(rec);return {id:rec.id,status:status,code:code,hold:hold};
}

  modal('🎁 쿠폰 발급 완료','',`<div style="text-align:center;margin-bottom:14px"><div class="t-sub">쿠폰 번호</div><div style="font-size:26px;font-weight:800;letter-spacing:2px;color:var(--billy-blue);margin:4px 0">${escH(code)}</div></div>
    <div style="font-weight:700;font-size:12.5px;margin-bottom:6px">📨 고객 전달 메시지 (복사해서 보내세요)</div>
    <textarea id="cp_msg" readonly onclick="this.select()" style="width:100%;min-height:236px;font-size:12.5px;line-height:1.6;border:1px solid var(--gray-200);border-radius:var(--r-md);padding:12px;background:#f8f9fb;color:var(--gray-800);resize:vertical">${escH(msg)}</textarea>`,
    `<button class="btn btn-secondary" onclick="copyText('${escH(code)}')">번호만 복사</button><button class="btn btn-primary" onclick="copyCouponText('${escH(code)}')">📋 메시지 전체 복사</button>`);
}
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('복사했어요.','ok');},function(){_copyFallback(t);});}else _copyFallback(t);}
function _copyFallback(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('복사했어요.','ok');}catch(e){toast('복사 실패 — 메시지를 직접 선택해 복사하세요.','err');}ta.remove();}
function copyCouponText(code){copyText(couponMsg(code));}
function couponMsgModal(id){const r=DB.coupons.find(x=>x.id===id);if(!r||!r.code){toast('발급된 코드가 없어요.','err');return;}couponSuccessModal(r.code);}
function couponDecide(id,status){
  sv('fin_coupon_decide',{p_id:id,p_status:status,p_reason:''},()=>{const r=DB.coupons.find(x=>x.id===id);if(r&&status==='issued'){const av=DB.couponCodes.find(x=>x.status==='available');if(av){av.status='issued';r.code=av.code;r.status='issued';r.hold='';}}}).then(()=>{render();if(status==='issued'){const r=DB.coupons.find(x=>x.id===id);if(r&&r.status==='issued'&&r.code)couponSuccessModal(r.code);else toast('코드 재고가 없어 발급하지 못했어요. 코드를 추가하세요.','err');}});
}
function couponReject(id){confirmModal('쿠폰 반려','이 신청을 반려할까요?',function(){sv('fin_coupon_decide',{p_id:id,p_status:'rejected',p_reason:''},()=>{const r=DB.coupons.find(x=>x.id===id);if(r)r.status='rejected';}).then(()=>{render();toast('반려했어요.');});});}
function couponVoid(id){confirmModal('쿠폰 무효 처리','이미 전달된 코드는 회수되지 않아요. 기록만 무효로 표시할까요?',function(){sv('fin_coupon_decide',{p_id:id,p_status:'void',p_reason:''},()=>{const r=DB.coupons.find(x=>x.id===id);if(r)r.status='void';}).then(()=>{render();toast('무효 처리했어요.');});});}
function openCouponCodeForm(){
  modal('쿠폰 코드 추가 (관리자)','',`<div class="policy" style="background:var(--billy-blue-50);border-color:var(--billy-blue-100)"><b style="color:var(--billy-blue)">🔐 보안 검증된 쿠폰번호</b>를 한 줄에 하나씩 붙여넣으세요. 신청 시 위에서부터 자동 배정돼요. <span class="t-sub">(현재 재고 ${couponStock()}장)</span></div>
    <div class="form-row"><textarea class="input" id="cc_codes" style="min-height:150px;font-family:monospace;font-size:13px;letter-spacing:.5px" placeholder="ABCD1234&#10;EFGH5678&#10;IJKL9012"></textarea></div>
    <div class="t-sub">중복 코드는 자동으로 걸러져요. 3만원 코드만 넣어주세요.</div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="submitCouponCodes()">코드 추가</button>`);
}
function submitCouponCodes(){
  const codes=val('cc_codes').split(/\r?\n/).map(s=>s.trim().toUpperCase()).filter(Boolean);
  if(!codes.length){toast('코드를 붙여넣어 주세요.','err');return;}
  if(IS_SUPA){sb.rpc('fin_coupon_add_codes',{p:{codes:codes}}).then(({data,error})=>{if(error){toast(error.message||'오류','err');return;}loadData().then(()=>{closeModal();render();toast(((data&&data.added)||0)+'개 코드를 추가했어요.','ok');});});}
  else{let added=0;codes.forEach(c=>{if(!DB.couponCodes.some(x=>x.code===c)){DB.couponCodes.push({code:c,amount:30000,status:'available'});added++;}});closeModal();render();toast(added+'개 코드를 추가했어요.','ok');}
}
/* ===================== 모달/토스트 ===================== */
function modal(title,cls,body,foot){closeModal();const ov=document.createElement('div');ov.className='overlay';ov.id='ov';ov.innerHTML=`<div class="modal ${cls||''}"><div class="modal-head"><h3>${escH(title)}</h3><button class="x" onclick="closeModal()">${I.x}</button></div><div class="modal-body">${body}</div>${foot?`<div class="modal-foot">${foot}</div>`:''}</div>`;ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});document.body.appendChild(ov);}
function closeModal(){const o=document.getElementById('ov');if(o)o.remove();}
function confirmModal(title,msg,onYes){closeModal();const ov=document.createElement('div');ov.className='overlay';ov.id='ov';ov.innerHTML=`<div class="modal" style="width:430px"><div class="modal-head"><h3>${escH(title)}</h3><button class="x" onclick="closeModal()">${I.x}</button></div><div class="modal-body"><div style="font-size:14px;line-height:1.65;color:var(--gray-800)">${msg}</div></div><div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">취소</button><button class="btn btn-primary" id="cfy">확인</button></div></div>`;ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});document.body.appendChild(ov);document.getElementById('cfy').onclick=()=>{closeModal();onYes&&onYes();};}
function toast(msg,type){const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.innerHTML=(type==='ok'?I.check:'')+'<span>'+escH(msg)+'</span>';document.body.appendChild(t);setTimeout(()=>{t.style.transition='.3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2400);}
/* ===================== Supabase: 인증 · 데이터 · 저장 ===================== */
function roleLabel(r){return {finance:'재무 승인',exec:'대표',viewer:'조회',lead:'팀장',member:'직원'}[r]||'직원';}
function normalizeTeam(t){t=String(t||'');if(/brand|브랜드/i.test(t))return 'Brand';if(/product/i.test(t))return 'Product';if(/commerce|커머스/i.test(t))return 'Commerce';if(/m&e|marketer|마케|마에/i.test(t))return 'M&E';if(/biz/i.test(t))return 'Biz';if(/ga/i.test(t))return 'GA';return t;}
async function loadMe(){
  let role='member',name='',team='',email='';
  try{const{data}=await sb.rpc('fin_me');if(data){role=data.role||'member';name=data.name||'';team=data.team||'';email=data.email||'';}}catch(e){}
  if(!name||!team){try{const{data:hr}=await sb.rpc('get_me');if(hr){name=name||hr.name||'';team=team||normalizeTeam(hr.dept||hr.team||'');}}catch(e){}}
  if(!email){try{const{data:u}=await sb.auth.getUser();email=(u&&u.user&&u.user.email)||'';}catch(e){}}
  if(!name)name=(email.split('@')[0]||'사용자');
  SUPA_USER={email,role,name,team,av:(name||'·').slice(0,1),rl:roleLabel(role)};ROLE=role;
}
function _mapPayout(r){return {id:r.id,requester:r.requester_name,team:r.team,payee:r.payee,bank:r.bank,account:r.account,amount:Number(r.amount)||0,unit:r.currency||'원',category:r.category,purpose:r.purpose,evidence:r.evidence_url,hasTax:r.has_tax,proofType:r.proof_type||'',proofDate:r.proof_date||'',proofStatus:r.proof_status||'',proofReason:r.proof_none_reason||'',proofReceivedAt:r.proof_received_at||'',status:r.status,paidAt:r.paid_date||'',applied:(r.created_at||'').slice(0,10),wh:r.wh,fuel:r.fuel};}
function _mapInvoice(r){return {id:r.id,requester:r.requester_name,team:r.team,saleType:r.sale_type,bizNo:r.biz_no,company:r.company,ceo:r.ceo,email:r.email,writeDate:r.write_date,itemName:r.item_name,supply:Number(r.supply)||0,tax:Number(r.vat)||0,total:Number(r.total)||0,evidence:r.evidence_url,status:r.status,applied:(r.created_at||'').slice(0,10),issuedAt:r.issued_date||''};}
function _mapCoupon(r){return {id:r.id,requester:r.requester_name,requesterEmail:r.requester_email,team:r.team,name:r.recipient_name,phone:r.recipient_phone,phoneNorm:r.recipient_phone_norm,amount:Number(r.amount)||0,code:r.code||'',status:r.status,hold:r.hold_reason||'',isOverride:r.is_override,memo:r.memo||'',createdAt:(r.created_at||'').slice(0,10)};}
async function fetchAllRows(factory){const PAGE=1000;let from=0,all=[];for(;;){const{data,error}=await factory().range(from,from+PAGE-1);if(error)throw error;all=all.concat(data||[]);if(!data||data.length<PAGE)break;from+=PAGE;}return all;}
async function loadData(){
  if(!IS_SUPA)return;
  const[po,iv,ve,rc,lo,cp]=await Promise.all([
    fetchAllRows(()=>sb.from('fin_payouts').select('*').order('created_at',{ascending:false})),
    fetchAllRows(()=>sb.from('fin_invoices').select('*').order('created_at',{ascending:false})),
    fetchAllRows(()=>sb.from('fin_vendors').select('*, accounts:fin_vendor_accounts(*)').order('tx_count',{ascending:false})),
    sb.from('fin_recurring').select('*'),
    sb.from('fin_locks').select('ym'),
    fetchAllRows(()=>sb.from('fin_coupon_issues').select('*').order('created_at',{ascending:false}))]);
  DB.payout=po.map(_mapPayout);
  DB.invoice=iv.map(_mapInvoice);
  VENDORS.length=0;ve.forEach(v=>VENDORS.push({id:v.id,name:v.name,bizNo:v.biz_no,email:v.email,team:v.team,unit:v.unit||'원',cnt:v.tx_count||0,avg:Number(v.avg_amount)||0,max:Number(v.max_amount)||0,lastDate:v.last_date||'',bankbookUrl:v.bankbook_url||'',bizregUrl:v.bizreg_url||'',accounts:(v.accounts||[]).map(a=>({id:a.id,bank:a.bank,account:a.account,holder:a.holder,primary:a.is_primary})).sort((a,b)=>(b.primary?1:0)-(a.primary?1:0))}));
  DB.templates=(rc.data||[]).map(t=>({id:t.id,payee:t.payee,bank:t.bank,account:t.account,amount:Number(t.amount)||0,category:t.category,total:t.total,done:t.done,nextDate:t.next_date,requester:t.requester_name,team:t.team}));
  LOCKED=new Set((lo.data||[]).map(x=>x.ym));
  DB.coupons=(cp||[]).map(_mapCoupon);
  try{const{data:stk}=await sb.rpc('fin_coupon_stock');COUPON_STOCK=Number(stk)||0;}catch(e){COUPON_STOCK=0;}
}
/* 저장: 실모드=RPC→새로고침 / 데모=mockFn */
function sv(rpc,args,mockFn){if(!IS_SUPA){if(mockFn)mockFn();return Promise.resolve(true);}return sb.rpc(rpc,args).then(({data,error})=>{if(error){toast(error.message||'오류가 났어요','err');throw error;}return loadData();});}
function payoutPayload(r,recurTotal){return {payee:r.payee,bank:r.bank,account:r.account,amount:r.amount,unit:r.unit,category:r.category,purpose:r.purpose,evidence:r.evidence||'',hasTax:!!r.hasTax,proofType:r.proofType||'',proofDate:r.proofDate||'',proofStatus:r.proofStatus||'',proofReason:r.proofReason||'',wh:r.wh||null,fuel:r.fuel||null,requester_name:ME().name,team:ME().team,recurTotal:recurTotal||0};}
function invoicePayload(r){return {company:r.company,bizNo:r.bizNo,ceo:r.ceo,email:r.email,saleType:r.saleType,writeDate:r.writeDate,itemName:r.itemName,supply:r.supply,vat:r.tax,total:r.total,evidence:r.evidence||'',requester_name:ME().name,team:ME().team};}
/* ── 로그인 (이메일 OTP) ── */
let _loginEmail='';
function renderLogin(){
  document.querySelector('.layout').style.display='none';
  let el=document.getElementById('loginScreen');if(!el){el=document.createElement('div');el.id='loginScreen';document.body.appendChild(el);}
  el.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,var(--billy-blue-50),var(--billy-pink-soft));padding:24px"><div class="card" style="width:404px;max-width:100%;padding:34px 32px"><div style="display:flex;align-items:center;gap:11px;margin-bottom:22px"><div style="width:44px;height:44px;border-radius:50%;overflow:hidden;box-shadow:var(--sh-blue);flex-shrink:0"><img src="https://villagebaby.kr/assets/img/billy-author-256.png" alt="베이비빌리" style="width:100%;height:100%;object-fit:cover"></div><div><div style="font-weight:700;font-size:17px">빌리지베이비 재무</div><div style="font-size:12px;color:var(--gray)">finance.villagebaby.kr</div></div></div><h2 style="font-size:22px;font-weight:700;margin-bottom:7px">로그인</h2><p style="color:var(--gray);font-size:13px;margin-bottom:22px;line-height:1.55">@villagebaby.kr 이메일로 로그인 코드를 받아 입력하세요.<br>별도 가입은 필요 없습니다.</p><div id="loginStep1"><div class="form-row"><label>회사 이메일</label><div class="email-row"><input class="input" id="liEmail" autocomplete="username" placeholder="아이디 입력 (예: jy.lee)" onkeydown="if(event.key==='Enter')finSendCode()"><span class="email-suffix">@villagebaby.kr</span></div></div><button class="btn btn-primary btn-pill btn-block" onclick="finSendCode()">인증코드 받기</button></div><div id="loginStep2" style="display:none"><div class="form-row"><label>인증코드 <span class="hint" id="liSent"></span></label><input class="input" id="liCode" inputmode="numeric" placeholder="메일로 받은 코드" onkeydown="if(event.key==='Enter')finVerify()"></div><button class="btn btn-primary btn-pill btn-block" onclick="finVerify()">로그인</button><button class="btn btn-secondary btn-pill btn-block" style="margin-top:8px" onclick="document.getElementById('loginStep2').style.display='none';document.getElementById('loginStep1').style.display='block'">이메일 다시 입력</button></div><div class="login-msg" id="loginMsg"></div></div></div>`;
  const _e=document.getElementById('liEmail');if(_e)_e.focus();
}
function _lmsg(m,err){const el=document.getElementById('loginMsg');if(el){el.textContent=m;el.style.color=err?'var(--sys-red)':'var(--billy-blue)';}}
function finSendCode(){
  let email=(document.getElementById('liEmail').value||'').trim().toLowerCase();
  if(!email){_lmsg('아이디를 입력해 주세요.',true);return;}
  if(email.indexOf('@')<0)email=email+'@villagebaby.kr';   // 도메인 자동 보완(HR과 동일)
  _loginEmail=email;_lmsg('확인 중…');
  sb.rpc('is_roster_email',{p_email:email}).then(({data,error})=>{
    if(!error&&data===false){_lmsg('등록된 @villagebaby.kr 이메일이 아니에요. 관리자에게 문의하세요.',true);return;}
    sb.auth.signInWithOtp({email,options:{shouldCreateUser:true}}).then(({error})=>{
      if(error){_lmsg(error.message||'코드 발송 실패 — 잠시 후 다시.',true);return;}
      document.getElementById('loginStep1').style.display='none';document.getElementById('loginStep2').style.display='block';
      const s=document.getElementById('liSent');if(s)s.textContent=email;
      _lmsg('인증코드를 메일로 보냈어요. (10분 내 입력)');const c=document.getElementById('liCode');if(c)c.focus();
    });
  }).catch(()=>_lmsg('네트워크 오류 — 다시 시도하세요.',true));
}
function finVerify(){const token=(document.getElementById('liCode').value||'').trim();if(!token){_lmsg('코드를 입력하세요.',true);return;}_lmsg('확인 중…');sb.auth.verifyOtp({email:_loginEmail,token,type:'email'}).then(({error})=>{if(error){_lmsg(error.message||'코드가 맞지 않아요.',true);return;}startApp();});}
function logout(){if(sb)sb.auth.signOut().then(()=>location.reload());}
async function startApp(){const ls=document.getElementById('loginScreen');if(ls)ls.remove();document.querySelector('.layout').style.display='';await loadMe();await loadData();const rsel=document.querySelector('.rolesel');if(rsel)rsel.innerHTML='<button class="btn btn-sm btn-secondary btn-block" onclick="logout()">로그아웃</button>';const dn=document.querySelector('.demo-note');if(dn)dn.textContent=ME().name+' · '+ME().rl;render();}
async function bootstrap(){if(!IS_SUPA){render();return;}try{const{data}=await sb.auth.getSession();if(data&&data.session){await startApp();}else{renderLogin();}}catch(e){renderLogin();}}
bootstrap();
</script>
</body>
</html>
